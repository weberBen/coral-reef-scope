services:
  init:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - terrain-data:/app/data
      - terrain-cache:/app/cache
    environment:
      - FORCE_REGENERATE=${FORCE_REGENERATE:-0}
      - REEF_LAT=${REEF_LAT:--17.52}
      - REEF_LON=${REEF_LON:--149.83}
      - REEF_RADIUS=${REEF_RADIUS:-4}
      - REEF_RESOLUTION=${REEF_RESOLUTION:-0.0003}
      - REEF_LABEL=${REEF_LABEL:-Moorea Nord}
      - REEF_LOCATION=${REEF_LOCATION:-French Polynesia}
    command: ["echo", "Reef generation done."]

  frontend:
    build:
      context: .
      dockerfile: mooring-sim/Dockerfile
    volumes:
      - terrain-data:/app/data:ro
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "${FRONTEND_PORT:-8090}:80"

volumes:
  terrain-data:
  terrain-cache:
