services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - terrain-data:/app/data
      - terrain-cache:/app/cache
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - FORCE_REGENERATE=${FORCE_REGENERATE:-0}

  frontend:
    build:
      context: .
      dockerfile: mooring-sim/Dockerfile
    ports:
      - "${FRONTEND_PORT:-8090}:80"

volumes:
  terrain-data:
  terrain-cache:
