data_dir: data              # dossier pour toutes les entrées/sorties

terrain:
  source: allen
  output: terrain.npz         # → data_dir/terrain.npz

  allen:
    bbox: [-149.87, -17.555, -149.80, -17.485]  # Moorea nord, Polynésie française
    resolution: 0.0003      # degrés par pixel (~33m)
    cache_dir: cache/

  procedural:
    length_x: 2000          # mètres
    length_y: 2000
    resolution: 2.0         # mètres par pixel
    seed: 42
    octaves: 6
    rugosity: 1.5           # amplitude bruit haute fréquence (m)
    flat_depth: 20.0        # profondeur du fond plat

    zones:
      - bounds: [100, 200, 900, 1800]   # [x_min, y_min, x_max, y_max] en mètres
        profile:                         # [distance_au_bord_m, profondeur_m]
          - [0, 20.0]                    # bord = fond
          - [30, 8.0]                    # pente externe
          - [100, 1.5]                   # platier
          - [150, 0.3]                   # crête
          - [200, 1.5]                   # centre

      - bounds: [1200, 400, 1700, 1200]
        profile:
          - [0, 20.0]
          - [20, 5.0]
          - [80, 0.5]
          - [120, 2.0]

colony:
  input: terrain.npz
  output: reef.glb
  seed: 42
  ram_limit: 500               # Mo max pour la matrice KJMA
  cpu_core_limit: 4            # cores max pour numpy

  kjma:
    base_speed: 1.0
    anisotropy: 2.0              # 1=sphère, 2=ellipsoïde 2:1
    max_height: 0.5             # hauteur max d'une colonie (m)
    boundary_sharpness: 3.0      # netteté des frontières
    w_gravity: 1.0
    w_light: 0.5
    w_current: 0.3
    sun_direction: [0, 0, 1]
    current_direction: [1, 0, 0]
    light_decay: 0.05            # atténuation lumière par m de profondeur
    max_slope: 70                # degrés max pour la croissance
    current_boost: 1.5

  placement:
    zones:
      - depth: [0.5, 5]
        density: 0.005
      - depth: [5, 15]
        density: 0.003
      - depth: [15, 25]
        density: 0.001

mooring:
  file: mooring.dat              # fichier MoorDyn dans data_dir

viz:
  input: terrain.npz
  output_html: reef_3d.html
  z_exaggeration: 5           # exagération verticale
  contour_interval: 2.0      # mètres entre isolines
  zoom: 14
  pitch: 60                  # angle de vue initial
