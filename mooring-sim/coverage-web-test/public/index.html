<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coral Reef Scope</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0e17;
      color: #c8d6e5;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 360px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      background: #111827;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #1e3a5f;
    }
    header h1 {
      font-size: 16px;
      color: #38bdf8;
      white-space: nowrap;
    }
    header .coords {
      font-size: 13px;
      color: #64748b;
      font-family: monospace;
    }

    /* Sidebar */
    #sidebar {
      background: #111827;
      border-right: 1px solid #1e3a5f;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #map {
      width: 100%;
      height: 280px;
      min-height: 200px;
    }

    .panel {
      padding: 12px 14px;
      border-bottom: 1px solid #1e3a5f;
    }
    .panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .slider-row label {
      font-size: 13px;
      min-width: 100px;
    }
    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #38bdf8;
    }
    .slider-row .val {
      font-size: 12px;
      font-family: monospace;
      color: #38bdf8;
      min-width: 40px;
      text-align: right;
    }

    button.action {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s;
      margin-bottom: 6px;
    }
    button.action:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #0ea5e9;
      color: white;
    }
    .btn-primary:hover:not(:disabled) { background: #0284c7; }
    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155 !important;
    }
    .btn-secondary:hover:not(:disabled) { background: #334155; color: #e2e8f0; }

    #status {
      font-size: 12px;
      color: #64748b;
      padding: 6px 0;
      min-height: 24px;
    }
    #status.error { color: #f87171; }
    #status.success { color: #4ade80; }

    #progress-bar {
      width: 100%;
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
      display: none;
    }
    #progress-bar .fill {
      height: 100%;
      background: #0ea5e9;
      width: 0%;
      transition: width 0.3s;
    }

    /* Info panel */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      font-size: 12px;
    }
    .info-grid dt { color: #64748b; }
    .info-grid dd { color: #94a3b8; font-family: monospace; }

    /* Checkbox row */
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .check-row input { accent-color: #38bdf8; }

    /* 3D canvas */
    #viewer {
      position: relative;
      background: #060a12;
      overflow: hidden;
    }
    #viewer canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* Drop zone overlay */
    #drop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(14, 165, 233, 0.15);
      border: 3px dashed #0ea5e9;
      z-index: 10;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #38bdf8;
      pointer-events: none;
    }

    /* KJMA params */
    .param-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .param-row label { min-width: 90px; color: #94a3b8; }
    .param-row input[type="number"] {
      width: 70px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 3px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>Coral Reef Scope</h1>
    <span class="coords" id="bbox-display">Draw a rectangle on the map</span>
  </header>

  <div id="sidebar">
    <div id="map"></div>

    <div class="panel">
      <h3>Actions</h3>
      <div id="progress-bar"><div class="fill"></div></div>
      <div id="status">Ready</div>
      <button class="action btn-primary" id="btn-generate" disabled>
        Generate reef (Allen + KJMA)
      </button>
      <button class="action btn-secondary" id="btn-load-glb">
        Load a .glb file
      </button>
      <input type="file" id="file-input" accept=".glb,.gltf" style="display:none">
    </div>

    <div class="panel">
      <h3>3D View</h3>
      <div class="slider-row">
        <label>Z exag.</label>
        <input type="range" id="z-exag" min="1" max="30" step="0.5" value="5">
        <span class="val" id="z-exag-val">5.0</span>
      </div>
      <div class="slider-row">
        <label>Opacity</label>
        <input type="range" id="opacity" min="0.1" max="1" step="0.05" value="1">
        <span class="val" id="opacity-val">1.0</span>
      </div>
      <div class="check-row">
        <input type="checkbox" id="wireframe"> <label for="wireframe">Wireframe</label>
      </div>
      <div class="check-row">
        <input type="checkbox" id="auto-rotate"> <label for="auto-rotate">Auto-rotation</label>
      </div>
    </div>

    <div class="panel" id="kjma-panel">
      <h3>KJMA Parameters</h3>
      <div class="param-row">
        <label>Resolution (m)</label>
        <input type="number" id="param-resolution" value="33" min="5" max="200">
      </div>
      <div class="param-row">
        <label>Max height (m)</label>
        <input type="number" id="param-max-height" value="0.5" min="0.1" max="5" step="0.1">
      </div>
      <div class="param-row">
        <label>Anisotropy</label>
        <input type="number" id="param-anisotropy" value="2.0" min="1" max="5" step="0.1">
      </div>
      <div class="param-row">
        <label>Seed density</label>
        <input type="number" id="param-density" value="0.004" min="0.001" max="0.02" step="0.001">
      </div>
    </div>

    <div class="panel">
      <h3>Info</h3>
      <dl class="info-grid" id="info">
        <dt>Vertices</dt><dd id="info-verts">-</dd>
        <dt>Faces</dt><dd id="info-faces">-</dd>
        <dt>Depth</dt><dd id="info-depth">-</dd>
        <dt>Size</dt><dd id="info-size">-</dd>
        <dt>Source</dt><dd id="info-source">-</dd>
      </dl>
    </div>
  </div>

  <div id="viewer">
    <div id="drop-overlay">Drop a .glb file here</div>
  </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<!-- Three.js -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module" src="js/app.js"></script>

</body>
</html>
