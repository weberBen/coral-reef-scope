<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>ReefScope — Autonomous Reef Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script>if(localStorage.getItem('rs-theme')==='light')document.documentElement.classList.add('light-theme')</script>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/presentation.css">
</head>
<body>
  <!-- ===== TAB BAR ===== -->
  <nav id="tab-bar">
    <div class="tab-logo" style="cursor:pointer" onclick="document.querySelector('[data-tab=concept]').click();document.getElementById('tab-concept').scrollTop=0">ReefScope</div>
    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="concept" data-i18n="tabConcept">Concept</button>
      <button class="tab-btn" data-tab="simulation" data-i18n="tabSimulation">Simulation</button>
      <button class="tab-btn" data-tab="coverage" data-i18n="tabCoverage">Couverture</button>
      <button class="tab-btn" id="lang-toggle" title="FR / EN" style="font-size:12px;font-weight:800;letter-spacing:1px">FR</button>
      <button class="tab-btn" id="theme-toggle" title="Changer le theme">
        <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 20 20" fill="currentColor" style="display:none"><circle cx="10" cy="10" r="4"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
    </div>
  </nav>

  <!-- ===== TAB: CONCEPT ===== -->
  <div id="tab-concept" class="tab-content active">
    <div id="presentation"></div>
  </div>

  <!-- ===== TAB: SIMULATION ===== -->
  <div id="tab-simulation" class="tab-content" style="display:none">
    <div id="status" class="status ok">OK</div>
    <div id="angle-display">
      <div class="angle-label" data-i18n="simAngleLabel">Deviation verticale max</div>
      <div class="angle-value" id="angle-value">0.0°</div>
    </div>
    <div id="readouts">
      <div class="r"><span data-i18n="simDepth">Profondeur dispositif</span><b id="ro-depth">--</b></div>
      <div class="r"><span data-i18n="simHeight">Hauteur / fond</span><b id="ro-h">--</b></div>
      <div class="r"><span data-i18n="simExcursion">Excursion horizontale</span><b id="ro-exc">--</b></div>
      <div class="r"><span data-i18n="simAngle">Angle max / vertical</span><b id="ro-ang">--</b></div>
      <div class="r hl"><span data-i18n="simTmax">Tension max cable</span><b id="ro-tmax">--</b></div>
      <div class="r"><span data-i18n="simAnchorV">Ancrage — vertical</span><b id="ro-av">--</b></div>
      <div class="r"><span data-i18n="simAnchorH">Ancrage — horizontal</span><b id="ro-ah">--</b></div>
      <div class="r hl"><span data-i18n="simAnchorT">Ancrage — total</span><b id="ro-at">--</b></div>
      <div class="r"><span data-i18n="simMBL">Resistance cable (MBL)</span><b id="ro-mbl">--</b></div>
      <div class="r hl"><span data-i18n="simSF">Coeff. de securite</span><b id="ro-sf">--</b></div>
      <div class="r"><span data-i18n="simCable">Cable deploye</span><b id="ro-cable">--</b></div>
      <div class="r"><span data-i18n="simSpeed">Vitesse deploiement</span><b id="ro-speed">--</b></div>
    </div>
  </div>

  <!-- ===== TAB: COVERAGE ===== -->
  <div id="tab-coverage" class="tab-content" style="display:none;position:relative;height:calc(100vh - 48px)">
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
